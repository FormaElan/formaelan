<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quiz de certification — FormaElan</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    #quizApp { min-height: 60vh; }

    .qz-back {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .84rem; color: var(--text-secondary);
      margin-bottom: 2rem; transition: color .2s;
    }
    .qz-back:hover { color: var(--text-accent); }

    .qz-wrap { max-width: 740px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

    .qz-error {
      max-width: 480px; margin: 4rem auto; text-align: center;
      padding: 3rem 2rem;
    }
    .qz-error-icon { font-size: 3rem; margin-bottom: 1rem; }
    .qz-error h2 { font-size: 1.4rem; margin-bottom: .75rem; }
    .qz-error p  { color: var(--text-secondary); margin-bottom: 2rem; }

    .qz-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .8rem; font-weight: 700; letter-spacing: .04em;
      color: var(--text-accent); background: rgba(26,158,143,.1);
      border: 1px solid rgba(26,158,143,.25); border-radius: 20px;
      padding: .3rem 1rem; margin-bottom: 1rem;
    }
    .qz-title { font-size: 1.8rem; font-weight: 800; margin-bottom: .6rem; }
    .qz-intro {
      font-size: .9rem; line-height: 1.7;
      color: var(--text-secondary); margin-bottom: 2.5rem;
    }

    .qz-form { display: flex; flex-direction: column; gap: 1.5rem; }

    .qz-q {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border-glass);
      border-radius: 14px; padding: 1.4rem 1.6rem;
    }
    .qz-q-num {
      font-size: .72rem; font-weight: 700; color: var(--text-accent);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: .6rem;
    }
    .qz-q-text {
      font-weight: 600; font-size: .97rem; line-height: 1.45;
      margin-bottom: 1.1rem;
    }
    .qz-choices { display: flex; flex-direction: column; gap: .5rem; }

    .qz-choice {
      display: flex; align-items: flex-start; gap: .75rem;
      padding: .7rem 1rem; border-radius: 9px;
      border: 1px solid var(--border-glass); cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .qz-choice:hover { border-color: rgba(26,158,143,.45); }
    .qz-choice input[type="radio"] {
      margin-top: .18rem; accent-color: #1A9E8F;
      flex-shrink: 0; width: 15px; height: 15px;
    }
    .qz-choice span { font-size: .9rem; color: var(--text-secondary); line-height: 1.45; }
    .qz-choice:has(input:checked) {
      border-color: var(--text-accent); background: rgba(26,158,143,.08);
    }
    .qz-choice:has(input:checked) span { color: var(--text-primary); }

    /* Result highlighting */
    .qz-right {
      border-color: #22c55e !important;
      background: rgba(34,197,94,.09) !important;
    }
    .qz-right span { color: #4ade80 !important; }
    .qz-wrong {
      border-color: #ef4444 !important;
      background: rgba(239,68,68,.09) !important;
    }
    .qz-wrong span { color: #f87171 !important; }

    .qz-submit-row { display: flex; justify-content: center; margin-top: 1rem; }

    /* Buttons */
    .qz-btn {
      display: inline-block; padding: .8rem 1.8rem; border-radius: 10px;
      font-weight: 700; font-size: .9rem; text-decoration: none;
      border: 1px solid var(--border-glass); color: var(--text-secondary);
      cursor: pointer; transition: all .2s; background: transparent;
      margin: .3rem;
    }
    .qz-btn:hover { border-color: var(--text-accent); color: var(--text-primary); }
    .qz-btn-primary {
      background: linear-gradient(135deg, #1A9E8F, #0d7a6e);
      border-color: transparent; color: #fff; padding: .9rem 2.2rem;
    }
    .qz-btn-primary:hover { opacity: .9; color: #fff; }
    .qz-btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .qz-btn-secondary {
      border-color: var(--border-glass); color: var(--text-secondary);
    }

    /* Result box */
    .qz-result {
      margin-top: 2.5rem; padding: 2rem 2rem 2.5rem;
      border-radius: 16px; text-align: center;
      border: 1px solid;
    }
    .qz-pass { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.05); }
    .qz-fail { border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.05); }
    .qz-result-icon { font-size: 2.8rem; margin-bottom: .8rem; }
    .qz-result h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: .7rem; }
    .qz-result p { color: var(--text-secondary); line-height: 1.7; margin-bottom: 1.6rem; }

    /* Cert form */
    .qz-cert-form { text-align: left; max-width: 460px; margin: 0 auto; }
    .qz-field { margin-bottom: 1rem; }
    .qz-field label {
      display: block; font-size: .83rem; font-weight: 600;
      color: var(--text-secondary); margin-bottom: .4rem;
    }
    .qz-field input {
      width: 100%; padding: .75rem 1rem; border-radius: 9px;
      border: 1px solid var(--border-glass);
      background: rgba(255,255,255,.04); color: var(--text-primary);
      font-size: .9rem; font-family: inherit; box-sizing: border-box;
      transition: border-color .2s;
    }
    .qz-field input:focus {
      outline: none; border-color: var(--text-accent);
    }
    .qz-cert-form .qz-btn-primary { width: 100%; margin: .5rem 0 0; }
    .qz-privacy {
      font-size: .75rem; color: var(--text-secondary); opacity: .7;
      margin-top: .6rem; text-align: center;
    }
    .qz-send-error {
      color: #f87171; font-size: .82rem; margin-top: .5rem; text-align: center;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text"><span>Forma</span>Elan</div>
    </a>
    <div class="navbar-actions">
      <label class="theme-toggle" title="Changer le thème">
        <input type="checkbox" id="themeToggleInput"/>
        <div class="track"><div class="thumb">🌙</div></div>
      </label>
    </div>
  </nav>

  <div id="quizApp" style="padding-top:4rem;"></div>

  <script src="js/formations.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
