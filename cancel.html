<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement annulé — FormaElan</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text"><span>Forma</span>Elan</div>
    </a>
    <div class="navbar-actions">
      <label class="theme-toggle" title="Changer le thème">
        <input type="checkbox" id="themeToggleInput" />
        <div class="track"><div class="thumb">🌙</div></div>
      </label>
    </div>
  </nav>

  <div class="hero-grid" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>
  <div class="hero-orb hero-orb-1" style="position:fixed;"></div>

  <div class="result-page">
    <div class="result-card">
      <div class="result-icon cancel">😕</div>
      <h1>Paiement annulé</h1>
      <p>
        Ton paiement a été annulé ou interrompu. Aucune somme n'a été débitée.<br />
        Tu peux retenter l'opération quand tu le souhaites.
      </p>
      <div style="padding:1rem;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:var(--radius-sm);margin-bottom:1.5rem;font-size:0.88rem;color:var(--text-secondary);">
        💬 Un problème technique ? Écris-nous à <strong>contact@formaElan.fr</strong> — on t'aidera dans les 24h.
      </div>
      <div style="display:flex;gap:1rem;flex-direction:column;">
        <a href="javascript:history.back()" class="btn btn-primary" style="justify-content:center;">
          ← Retenter le paiement
        </a>
        <a href="index.html" class="btn btn-secondary" style="justify-content:center;">
          Retour aux formations
        </a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
