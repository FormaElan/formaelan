<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
  .label { color: #666; font-size: 13px; margin-bottom: 12px; }
  .banner { width: 1584px; height: 396px; display: block; }
  .hint { color: #555; font-size: 12px; margin-top: 16px; text-align: center; line-height: 1.8; }
  kbd { background: #333; color: #ccc; padding: 2px 6px; border-radius: 3px; font-size: 11px; }
</style>
</head>
<body>
  <div class="label">Bannière LinkedIn — 1584 × 396 px</div>

  <svg class="banner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396">
    <defs>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#0D1B3E"/>
        <stop offset="60%" style="stop-color:#0e2a40"/>
        <stop offset="100%" style="stop-color:#0f3a38"/>
      </linearGradient>
      <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#1A9E8F;stop-opacity:0.22"/>
        <stop offset="100%" style="stop-color:#137C72;stop-opacity:0.18"/>
      </linearGradient>
      <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#1A9E8F"/>
        <stop offset="100%" style="stop-color:#F26C3A"/>
      </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1584" height="396" fill="url(#bgGrad)"/>

    <!-- Lignes diagonales décoratives -->
    <g opacity="0.04">
      <line x1="800" y1="-50" x2="1600" y2="500" stroke="#1A9E8F" stroke-width="1.5"/>
      <line x1="860" y1="-50" x2="1660" y2="500" stroke="#1A9E8F" stroke-width="1.5"/>
      <line x1="920" y1="-50" x2="1720" y2="500" stroke="#1A9E8F" stroke-width="1.5"/>
      <line x1="980" y1="-50" x2="1780" y2="500" stroke="#1A9E8F" stroke-width="1.5"/>
      <line x1="1040" y1="-50" x2="1840" y2="500" stroke="#1A9E8F" stroke-width="1.5"/>
    </g>

    <!-- Zone photo LinkedIn ≈ x:0–420, y:220–396 → contenu déplacé à droite et en haut -->

    <!-- ══ LOGO — haut gauche (toujours visible) ══ -->
    <text x="60" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#1A9E8F" letter-spacing="-0.5">Forma</text>
    <text x="178" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Elan</text>

    <!-- Trait vertical séparateur -->
    <rect x="430" y="40" width="2" height="316" rx="1" fill="#1A9E8F" opacity="0.2"/>

    <!-- ══ CONTENU PRINCIPAL — x > 460, hors zone photo ══ -->

    <!-- Point orange + accroche -->
    <circle cx="462" cy="90" r="6" fill="#F26C3A"/>
    <text x="480" y="96" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" fill="#F26C3A" letter-spacing="0.3">Formations courtes et concrètes</text>

    <!-- Titre ligne 1 -->
    <text x="460" y="168" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-1">SEO, IA, copywriting :</text>

    <!-- Titre ligne 2 -->
    <text x="460" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#1A9E8F" letter-spacing="-1">apprends ce qui sert vraiment.</text>

    <!-- Description -->
    <text x="460" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" opacity="0.6">Des chapitres pratiques et des exercices applicables,</text>
    <text x="460" y="306" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" opacity="0.6">pensés pour les indépendants et freelances.</text>

    <!-- Tags -->
    <rect x="460" y="330" width="66" height="26" rx="13" fill="#0D1B3E" stroke="#1A9E8F" stroke-width="1.2"/>
    <text x="493" y="347" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1A9E8F" text-anchor="middle">SEO</text>

    <rect x="536" y="341" width="16" height="2" rx="1" fill="#1A9E8F" opacity="0.5"/>

    <rect x="557" y="330" width="48" height="26" rx="13" fill="#0D1B3E" stroke="#F26C3A" stroke-width="1.2"/>
    <text x="581" y="347" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#F26C3A" text-anchor="middle">IA</text>

    <rect x="610" y="341" width="16" height="2" rx="1" fill="#1A9E8F" opacity="0.5"/>

    <rect x="631" y="330" width="120" height="26" rx="13" fill="#0D1B3E" stroke="#1A9E8F" stroke-width="1.2"/>
    <text x="691" y="347" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1A9E8F" text-anchor="middle">Copywriting</text>

    <rect x="756" y="341" width="16" height="2" rx="1" fill="#1A9E8F" opacity="0.5"/>

    <rect x="777" y="330" width="126" height="26" rx="13" fill="#0D1B3E" stroke="#1A9E8F" stroke-width="1.2"/>
    <text x="840" y="347" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1A9E8F" text-anchor="middle">E-commerce</text>

    <!-- ══ CARTE INFO — droite ══ -->
    <rect x="1255" y="44" width="285" height="292" rx="12" fill="url(#cardGrad)" stroke="#1A9E8F" stroke-width="1" stroke-opacity="0.3"/>

    <text x="1283" y="100" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A9E8F" letter-spacing="2">FORMAT</text>
    <text x="1283" y="126" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">3 à 4 h par formation</text>
    <rect x="1283" y="144" width="226" height="1" fill="#1A9E8F" opacity="0.2"/>

    <text x="1283" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A9E8F" letter-spacing="2">MÉTHODE</text>
    <text x="1283" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">1 chapitre = 1 compétence</text>
    <rect x="1283" y="220" width="226" height="1" fill="#1A9E8F" opacity="0.2"/>

    <text x="1283" y="252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#1A9E8F" letter-spacing="2">ACCÈS</text>
    <text x="1283" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">100 % en ligne, à vie</text>

    <!-- formaelan.fr -->
    <text x="1530" y="358" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#ffffff" opacity="0.3" text-anchor="end">formaelan.fr</text>

    <!-- Barre accent bas -->
    <rect x="0" y="390" width="1584" height="6" fill="url(#accentLine)"/>
  </svg>

  <div class="hint">
    Export PNG : <kbd>F12</kbd> → <kbd>Ctrl+Shift+P</kbd> → taper <kbd>screenshot</kbd> → <strong>Capture full size screenshot</strong>
  </div>
</body>
</html>
