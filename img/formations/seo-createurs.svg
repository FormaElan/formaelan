<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d0f3d"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Orbes de fond -->
  <circle cx="60" cy="60" r="80" fill="url(#glow1)" filter="url(#blur1)"/>
  <circle cx="340" cy="150" r="70" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Grille légère -->
  <g opacity="0.06" stroke="#EC4899" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
  </g>

  <!-- 3 icônes plateforme -->
  <!-- Google G -->
  <circle cx="90" cy="90" r="30" fill="rgba(26,158,143,0.12)" stroke="rgba(26,158,143,0.5)" stroke-width="1.5"/>
  <text x="90" y="97" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#1A9E8F">G</text>

  <!-- YouTube ▶ -->
  <circle cx="200" cy="90" r="30" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.5)" stroke-width="1.5"/>
  <text x="200" y="97" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" fill="#EF4444">▶</text>

  <!-- Pinterest P -->
  <circle cx="310" cy="90" r="30" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.55)" stroke-width="1.5"/>
  <text x="310" y="97" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#EC4899">P</text>

  <!-- Lignes de connexion -->
  <line x1="120" y1="90" x2="170" y2="90" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="90" x2="280" y2="90" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Labels plateforme -->
  <text x="90" y="134" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="600" fill="#1A9E8F" opacity="0.9">Google</text>
  <text x="200" y="134" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="600" fill="#EF4444" opacity="0.9">YouTube</text>
  <text x="310" y="134" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="600" fill="#EC4899" opacity="0.9">Pinterest</text>

  <!-- Titre bas -->
  <text x="200" y="164" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="0.04em">SEO POUR CRÉATEURS</text>
  <text x="200" y="180" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="8.5" fill="rgba(236,72,153,0.8)" letter-spacing="0.06em">3 MOTEURS · 1 SYSTÈME</text>
</svg>
